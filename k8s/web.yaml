kind: ConfigMap # v1, wave 0
apiVersion: v1
metadata:
  name: web-config
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0" # Chạy thứ 2 (sau Namespace)
data:
  MESSAGE: "hello from gitops"
---
apiVersion: apps/v1
kind: Deployment # apps/v1, wave 1
metadata:
  name: web
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1" # Chạy thứ 3 (đợi ConfigMap có sẵn)
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.27
          envFrom:
            - configMapRef:
                name: web-config
---
apiVersion: v1
kind: Service # v1, wave 2
metadata:
  name: web
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "2" # Chạy cuối cùng
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80